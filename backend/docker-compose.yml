version: '3.9'

services:
  backend:
    build: .
    image: project-management-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    ports:
      - "3002:3002"
    command: ["./docker-entrypoint.sh"]
    networks:
      pm_network:
        aliases:
          - backend

networks:
  pm_network:
    external: true

