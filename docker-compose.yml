  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '3002:3002'
