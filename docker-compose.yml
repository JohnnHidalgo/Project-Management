  backend:
    build: ./backend
    container_name: pm_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3002:3002"
    networks:
      - pm_network

  frontend:
    build: ./frontend
    container_name: pm_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "82:82"
    networks:
      - pm_network

networks:
  pm_network:
    driver: bridge

